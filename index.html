<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spesa Smart PRO + PDF</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .receipt-font { font-family: 'Courier New', Courier, monospace; }
        .dashed-line { border-top: 1px dashed #000; margin: 8px 0; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans text-gray-900">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden p-6 border border-gray-200">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold text-blue-600">🛒 Spesa Smart</h1>
            <button onclick="setStoreName()" class="text-gray-400 hover:text-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>
        
        <div id="reader" class="rounded-lg overflow-hidden border-2 border-blue-100 mb-4 bg-gray-50"></div>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="manual-barcode" placeholder="Codice a barre..." 
                   class="flex-1 border-2 border-gray-200 p-3 rounded-lg focus:border-blue-500 outline-none text-sm">
            <button onclick="addManual()" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold">Aggiungi</button>
        </div>

        <div class="border-t pt-4">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-semibold text-gray-700">Carrello</h2>
                <span id="items-count" class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-1 rounded-full">0 prodotti</span>
            </div>
            <div id="cart-list" class="space-y-2 max-h-60 overflow-y-auto mb-4 p-1">
                <p id="empty-msg" class="text-gray-400 text-center py-4 italic text-sm">Carrello vuoto</p>
            </div>
            <div class="flex justify-between items-center border-t border-dashed pt-4">
                <span class="text-xl font-bold">Totale:</span>
                <span id="total-amount" class="text-2xl font-black text-green-600">€ 0.00</span>
            </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-4">
            <button onclick="clearCart()" class="bg-gray-100 text-gray-500 py-3 rounded-lg font-semibold">Svuota</button>
            <button onclick="showReceipt()" class="bg-green-600 text-white py-3 rounded-lg font-bold shadow-md">Scontrino</button>
        </div>
    </div>

    <div id="receipt-modal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex flex-col items-center justify-center p-4 z-50">
        <div id="receipt-to-print" class="bg-white p-8 shadow-2xl w-full max-w-xs receipt-font text-black mb-4">
            <div class="text-center mb-4">
                <p id="display-store-name" class="font-bold text-lg uppercase tracking-widest">MIO NEGOZIO</p>
                <p id="receipt-date" class="text-[10px] text-gray-500 mt-1"></p>
            </div>
            <div class="dashed-line"></div>
            <div id="receipt-items" class="text-xs space-y-2"></div>
            <div class="dashed-line"></div>
            <div class="flex justify-between font-bold text-lg pt-2">
                <span>TOTALE</span>
                <span id="receipt-total">€ 0.00</span>
            </div>
            <div class="text-center mt-8 text-[9px] text-gray-400 italic">
                Documento emesso da App Spesa Smart
            </div>
        </div>

        <div class="flex gap-4 w-full max-w-xs">
            <button onclick="downloadPDF()" class="flex-1 bg-red-600 text-white py-3 rounded-lg font-bold shadow-lg flex items-center justify-center gap-2">
                📥 Scarica PDF
            </button>
            <button onclick="closeReceipt()" class="flex-1 bg-white text-black py-3 rounded-lg font-bold shadow-lg">
                Chiudi
            </button>
        </div>
    </div>

    <script>
        const initialDb = { "123": { name: "Prodotto Test", price: 5.00 } };
        let db = JSON.parse(localStorage.getItem('smart_shopping_db')) || initialDb;
        let storeName = localStorage.getItem('smart_store_name') || "IL MIO NEGOZIO";
        let cart = [];

        // Imposta nome negozio
        function setStoreName() {
            const nuovoNome = prompt("Inserisci il nome del punto vendita:", storeName);
            if(nuovoNome) {
                storeName = nuovoNome.toUpperCase();
                localStorage.setItem('smart_store_name', storeName);
                document.getElementById('display-store-name').innerText = storeName;
            }
        }

        // Inizializza Scanner
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 150 } });
        html5QrcodeScanner.render((decodedText) => processBarcode(decodedText));

        function addManual() {
            const input = document.getElementById('manual-barcode');
            if(!input.value) return;
            processBarcode(input.value.trim());
            input.value = "";
        }

        function processBarcode(code) {
            let product = db[code];
            let name, price;

            if (product) {
                name = product.name;
                const pInput = prompt(`Prodotto: ${name}\nPrezzo:`, product.price);
                price = parseFloat(pInput ? pInput.toString().replace(',', '.') : product.price);
            } else {
                name = prompt("Nuovo Prodotto! Nome:");
                if(!name) return;
                const pInput = prompt("Prezzo:");
                price = parseFloat(pInput ? pInput.replace(',', '.') : 0);
            }

            const qtyInput = prompt(`Quante unità di ${name}?`, "1");
            const qty = parseInt(qtyInput) || 1;

            db[code] = { name: name, price: price };
            localStorage.setItem('smart_shopping_db', JSON.stringify(db));

            for(let i=0; i < qty; i++) { cart.push({ name: name, price: price }); }
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            const totalEl = document.getElementById('total-amount');
            const countEl = document.getElementById('items-count');
            const emptyMsg = document.getElementById('empty-msg');
            list.innerHTML = '';
            let total = 0;

            if(cart.length > 0) {
                emptyMsg.classList.add('hidden');
                const grouped = cart.reduce((acc, item) => {
                    acc[item.name] = acc[item.name] || { price: item.price, qty: 0 };
                    acc[item.name].qty++;
                    return acc;
                }, {});
                for (const [n, d] of Object.entries(grouped)) {
                    total += (d.price * d.qty);
                    list.innerHTML += `<div class="flex justify-between p-2 bg-blue-50 rounded border text-sm">
                        <span>${n} (x${d.qty})</span><span class="font-bold">€ ${(d.price*d.qty).toFixed(2)}</span>
                    </div>`;
                }
            } else { emptyMsg.classList.remove('hidden'); }
            totalEl.innerText = `€ ${total.toFixed(2)}`;
            countEl.innerText = `${cart.length} art.`;
        }

        function showReceipt() {
            if(cart.length === 0) return alert("Carrello vuoto!");
            const itemsContainer = document.getElementById('receipt-items');
            document.getElementById('display-store-name').innerText = storeName;
            document.getElementById('receipt-date').innerText = new Date().toLocaleString('it-IT');
            let total = 0;
            itemsContainer.innerHTML = '';

            const grouped = cart.reduce((acc, item) => {
                acc[item.name] = acc[item.name] || { price: item.price, qty: 0 };
                acc[item.name].qty++;
                return acc;
            }, {});

            for (const [n, d] of Object.entries(grouped)) {
                total += (d.price * d.qty);
                itemsContainer.innerHTML += `<div class="flex justify-between">
                    <span>${n.substring(0,15)} x${d.qty}</span><span>€${(d.price*d.qty).toFixed(2)}</span>
                </div>`;
            }
            document.getElementById('receipt-total').innerText = `€ ${total.toFixed(2)}`;
            document.getElementById('receipt-modal').classList.remove('hidden');
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('receipt-to-print');
            
            // Crea immagine dello scontrino
            const canvas = await html2canvas(element, { scale: 3 });
            const imgData = canvas.toDataURL('image/png');
            
            // Crea PDF (formato adatto a scontrino stretto)
            const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: [80, 150] });
            const imgProps = pdf.getImageProperties(imgData);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
            
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save(`scontrino_${new Date().getTime()}.pdf`);
        }

        function closeReceipt() { document.getElementById('receipt-modal').classList.add('hidden'); }
        function clearCart() { if(confirm("Svuotare?")) { cart = []; updateUI(); } }
    </script>
</body>
</html>
